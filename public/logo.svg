<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Ladoga Boat Rental">
  <defs>
    <style>
      .b{fill:#1a2e4a}
      .w{fill:none;stroke:#3dbead;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <!-- Mast / antenna -->
  <line class="b" x1="192" y1="42" x2="197" y2="15" stroke="#1a2e4a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Speedboat silhouette -->
  <path class="b" d="
    M 78,107
    Q 195,122 312,96
    L 314,82
    Q 284,60 248,55
    Q 232,53 226,46
    Q 217,38 202,38
    Q 186,38 178,46
    Q 172,53 158,56
    L 115,64
    L 78,76
    Z
  "/>

  <!-- Wave 1 -->
  <path class="w" stroke-width="5" d="M 52,120 Q 120,108 188,120 Q 256,132 324,120 Q 342,116 356,120"/>
  <!-- Wave 2 -->
  <path class="w" stroke-width="3.5" opacity="0.65" d="M 42,135 Q 112,123 180,135 Q 248,147 316,135 Q 336,131 348,135"/>

  <!-- LADOGA -->
  <text x="200" y="192"
    font-family="'Arial Black',Arial,sans-serif"
    font-weight="900"
    font-size="60"
    letter-spacing="7"
    text-anchor="middle"
    fill="#1a2e4a">LADOGA</text>

  <!-- BOAT RENTAL -->
  <text x="200" y="222"
    font-family="'Arial Black',Arial,sans-serif"
    font-weight="700"
    font-size="22"
    letter-spacing="6"
    text-anchor="middle"
    fill="#3dbead">BOAT RENTAL</text>
</svg>
